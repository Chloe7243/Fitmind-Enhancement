<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitMind - Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="signin-container">
    <div class="signin-card">
        <h1>Welcome Back to FitMind</h1>
        <p class="subtext">Log in to track your stress and workouts.</p>

        <form class="signin-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="signin-btn">Sign In</button>
            <a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Home_Page/index.html"><button type="button" class="guest-btn">Continue as Guest</button></a>

            <p class="forgot-password"><a href="#">Forgot your password?</a></p>
        </form>

        <p class="register-link">New to FitMind? <a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Register_Page/register.html">Create an Account</a></p>
    </div>
</div>

</body>
</html>
