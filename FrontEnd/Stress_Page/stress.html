</head>

            <nav class="nav-links">
                <a href="index.html">Home</a>

<!-- Main Stress Tracking Section -->
<section class="stress-section">
    <h1>Stress Tracking</h1>
    <p class="subtext">Track your stress levels and receive personalized relaxation suggestions.</p>

    <form id="stress-form">
        <div class="form-group">
            <label>How stressed are you today? (1 = Very Low, 5 = Very High)</label>
            <div class="emoji-scale">
                <label><input type="radio" name="stress-level" value="1"> 😌</label>
                <label><input type="radio" name="stress-level" value="2"> 🙂</label>
                <label><input type="radio" name="stress-level" value="3"> 😐</label>
                <label><input type="radio" name="stress-level" value="4"> 😟</label>
                <label><input type="radio" name="stress-level" value="5"> 😫</label>
            </div>
        </div>

        <div class="form-group">
            <label for="stress-cause">What caused your stress today?</label>
            <input type="text" id="stress-cause" placeholder="e.g., Exams, Deadlines">
        </div>

        <div class="form-group">
            <label for="additional-notes">Additional Notes (optional)</label>
            <textarea id="additional-notes" rows="3" placeholder="Add any notes..."></textarea>
        </div>

        <button type="submit" class="log-btn">Log Stress</button>
    </form>

    <div class="stress-log">
        <h2>Logged Stress Entries</h2>
        <ul id="stress-list"></ul>
    </div>

    <div class="relaxation-suggestions">
        <h2>Recommended Relaxation Techniques</h2>
        <ul id="relaxation-list"></ul>
    </div>
</section>

</body>
</html>
