<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>FitMind - Stress Tracking</title>
      <link rel="stylesheet" href="style.css">
   </head>
   <body>
      <header>
         <div class="navbar">
            <div class="menu-container">
               <div class="menu-icon menu-btn" id="menu-icon">&#9776;</div>
               <div class="logo"><a
                  href="index.html">FitMind</a></div>
            </div>
            <nav class="nav-links">
               <a href="index.html">Home</a>
               <a href="javascript:void(0)">About</a>
               <a href="javascript:void(0)">Service</a>
               <a href="javascript:void(0)">Help</a>
            </nav>
            <a href="javascript:void(0);"><button
               class="sign-in">Sign In</button></a>
         </div>
      </header>
      
      <section class="stress-section">
         <h1>FitMind Community</h1>
         <p class="subtext">Connecting, Sharing and Celebrating</p>
         <form id="stress-form">
            <div class="form-group">
               <textarea id="Share-your-thoughts" rows="3" placeholder="Share your thoughts..."></textarea>
            </div>
            <button type="submit" class="log-btn">Post</button>
         </form>
         <div class="stress-log text-center">
            <h2>Recent Posts</h2>
         </div>
      </section>
   </body>
</html>
