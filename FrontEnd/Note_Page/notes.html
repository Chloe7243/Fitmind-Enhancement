<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>FitMind - Stress Tracking</title>
      <link rel="stylesheet" href="notes.css">
      <script defer src="notes.js"></script>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   </head>
   <body>
   
       <!-- Navigation Bar -->
       <header>
           <div class="navbar">
               <div class="menu-container">
                   <div class="menu-icon" id="menu-icon"><i class="fas fa-bars"></i> Menu</div>
               </div>
               <div class="logo"><a href="index.html">FitMind</a></div>
               <a href="/FITMIND-APP-MAIN-PROJECT/Sign_Page/sign-in.html"><button class="sign-in">Sign In</button></a>
           </div>
       </header>
   
       <!-- Sidebar Menu -->
       <div class="menu-box" id="menu-box">
           <ul>
               <li><a href="#dashboard"><i class="fas fa-chart-line"></i> Dashboard</a></li>
               <li><a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Stress_Page/stress.html"><i class="fas fa-heartbeat"></i> Stress Tracking</a></li>
               <li><a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Exercise_Page/exercise.html"><i class="fas fa-dumbbell"></i> Exercise Tracking</a></li>
               <li><a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Community_Page/index.html"><i class="fas fa-users"></i> Community</a></li>
               <li><a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Notification_Page/indexSetap.html"><i class="fas fa-bell"></i> Notifications</a></li>
               <li><a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Note_Page/index.html"><i class="fas fa-sticky-note"></i> My Note</a></li>
               <li><a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Settings_Page/index.html"><i class="fas fa-cog"></i> Settings</a></li>
               <li><a href="about.html"><i class="fas fa-user"></i> About Me</a></li>
           </ul>
       </div>
       
      <!-- Notes Section -->
      <section class="notes-section">
         <h1>My Notes</h1>
         <p class="subtext">Keep track of your reflections, workout notes, and stress-related thoughts.</p>

         <!-- Note Input -->
         <div class="note-form">
            <input type="text" id="note-title" placeholder="Note Title">
            <textarea id="note-content" rows="4" placeholder="Write your note..."></textarea>
            <button id="save-note-btn">Save Note</button>
         </div>

         <!-- Search & Show All Buttons -->
         <div class="search-container">
            <input type="text" id="search-notes" placeholder="Search notes...">
            <button id="search-btn">Search</button>
            <button id="show-all-btn">Show All Notes</button>
         </div>

         <!-- Saved Notes -->
         <div class="notes-container">
            <h2>Saved Notes</h2>
            <ul id="notes-list"></ul>
         </div>
   </section>

   </body>
</html>
