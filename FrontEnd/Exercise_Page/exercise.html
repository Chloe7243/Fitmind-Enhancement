<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitMind - Exercise Tracking</title>
    <link rel="stylesheet" href="exercise.css">
    <script defer src="exercise.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<body>

    <!-- Navigation Bar -->
    <header>
        <div class="navbar">
            <div class="menu-container">
                <div class="menu-icon" id="menu-icon"><i class="fas fa-bars"></i> Menu</div>
            </div>
            <div class="logo"><a href="index.html">FitMind</a></div>
            <a href="/FITMIND-APP-MAIN-PROJECT/Sign_Page/sign-in.html"><button class="sign-in">Sign In</button></a>
        </div>
    </header>

    <!-- Sidebar Menu -->
    <div class="menu-box" id="menu-box">
        <ul>
            <li><a href="#dashboard"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li><a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Stress_Page/stress.html"><i class="fas fa-heartbeat"></i> Stress Tracking</a></li>
            <li><a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Exercise_Page/exercise.html"><i class="fas fa-dumbbell"></i> Exercise Tracking</a></li>
            <li><a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Community_Page/index.html"><i class="fas fa-users"></i> Community</a></li>
            <li><a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Notification_Page/indexSetap.html"><i class="fas fa-bell"></i> Notifications</a></li>
            <li><a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Note_Page/index.html"><i class="fas fa-sticky-note"></i> My Note</a></li>
            <li><a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Settings_Page/index.html"><i class="fas fa-cog"></i> Settings</a></li>
            <li><a href="about.html"><i class="fas fa-user"></i> About Me</a></li>
        </ul>
    </div>
    

<!-- Main Exercise Page Content -->
<section class="exercise-section">
    <h1>Exercise Tracking</h1>
    <p class="subtext">Track your exercises and monitor your progress.</p>

    <form id="exercise-form">
        <div class="form-group">
            <label for="exercise-type">Exercise Type</label>
            <select id="exercise-type">
                <option value="Cardio">Cardio</option>
                <option value="Stretching">Stretching</option>
                <option value="Strength">Strength Training</option>
                <option value="Recreational">Recreational (Running, Cycling)</option>
                <option value="Yoga">Yoga</option>
                <option value="HIIT">High-Intensity Interval Training (HIIT)</option>
                <option value="Pilates">Pilates</option>
                <option value="Custom">Custom</option>
            </select>
            <input type="text" id="custom-exercise" placeholder="Enter custom exercise" style="display:none;">
        </div>

        <div class="form-group">
            <label for="duration">Duration (minutes)</label>
            <input type="number" id="duration" placeholder="Duration" required>
        </div>

        <button type="submit" class="log-btn">Log Exercise</button>
    </form>

    <div class="exercise-log">
        <h2>Logged Exercises</h2>
        <ul id="exercise-list"></ul>
    </div>

    <div class="progress-section">
        <h2>Progress Chart</h2>
        <canvas id="progress-chart"></canvas>
    </div>

    <div class="recommendations">
        <h2>Personalized Recommendations</h2>
        <ul id="suggestions-list"></ul>
    </div>
</section>

</body>
</html>
