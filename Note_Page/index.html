<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>FitMind - Stress Tracking</title>
      <link rel="stylesheet" href="style.css">
   </head>
   <body>
      <header>
         <div class="navbar">
            <div class="menu-container">
               <div class="menu-icon menu-btn" id="menu-icon">&#9776;</div>
               <div class="logo"><a
                  href="index.html">FitMind</a></div>
            </div>
            <nav class="nav-links">
               <a href="index.html">Home</a>
               <a href="javascript:void(0)">About</a>
               <a href="javascript:void(0)">Service</a>
               <a href="javascript:void(0)">Help</a>
            </nav>
            <a href="javascript:void(0);"><button
               class="sign-in">Sign In</button></a>
         </div>
      </header>

      <section class="stress-section">
         <h1>My Notes</h1>
         <p class="subtext">Keep track of your reflections, workout notes, and stress-related thoughts.
         </p>
         <form id="stress-form">
            <div class="form-group">
               <input type="text" id="Note-Title" placeholder="Note Title">
            </div>
            <div class="form-group">
               <textarea id="Write-your-note" rows="3" placeholder="Write your note..."></textarea>
            </div>
            <button type="submit" class="log-btn">Save Note</button>
            <div class="btnsec">
            	 <div class="form-group">
	               <input type="text" id="Search-notes" placeholder="Search notes...">
	            </div>
	            <div class="btnlast">
	            	 <button type="submit" class="log-btn">Search</button>
	            	  <button type="submit" class="log-btn">Show All Notes</button>
	            </div>
            </div>

         </form>
         <div class="stress-log">
            <h2>Saved Notes</h2>
         </div>
      </section>
   </body>
</html>
