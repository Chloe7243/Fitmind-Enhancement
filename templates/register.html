<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitMind - Register</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='css/register.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="register-container">
    <div class="register-card">
        <h1>Create Your FitMind Account</h1>
        <p class="subtext">Start tracking your stress and workouts today.</p>

        <form class="register-form" method="POST" action="/register">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="username" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm_password" placeholder="Confirm your password" required>
            </div>
            {% for message in get_flashed_messages() %}
                <div>{{message}}</div>
            {% endfor %}
            <button type="submit" class="register-btn"><i class="fas fa-user-plus"></i> Create Account</button>
        </form>

        <p class="login-link">Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
        <p class="terms-text">By signing up, you agree to our <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>.</p>
    </div>
</div>

</body>
</html>
