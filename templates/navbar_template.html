<!-- Navigation Bar -->
<header>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div id="flash-popup" class="flash-popup">
        {{ messages[0] }}
        </div>
    {% endif %}
    {% endwith %}

    <div class="navbar">
        <div class="menu-container">
            <div class="menu-icon" id="menu-icon"><i class="fas fa-bars"></i> Menu</div>
        </div>

        <div class="logo">
            <a href="{{ url_for('homepage') }}">FitMind</a>
        </div>

        <nav>
            {% if current_user.is_authenticated %}
              <a href="{{ url_for('logout') }}" class="nav-link">Logout</a>
            {% else %}
              <a href="{{ url_for('login') }}" class="nav-link">Sign In</a>
            {% endif %}
        </nav>
         
        <!-- Global Reminder Pop-up -->
        <div id="reminder-popup" class="reminder-popup">
            <div class="popup-content">
            <p id="reminder-message"></p>
            <button onclick="closeReminderPopup()">OK</button>
            </div>
        </div>
        
        <!-- Single Notification Sound -->
        <audio id="reminder-sound" src="{{ url_for('static', filename='audio/mixkit-bubble-pop-up-alert-notification-2357.wav') }}"></audio>
        
        
    </div>
</header>
