<!-- Navigation Bar -->
<header>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div id="flash-popup" class="flash-popup">
        {{ messages[0] }}
        </div>
    {% endif %}
    {% endwith %}

    <div class="navbar">
        <div class="menu-container">
            <div class="menu-icon" id="menu-icon"><i class="fas fa-bars"></i> Menu</div>
        </div>

        <div class="logo">
            <a href="{{ url_for('homepage') }}">FitMind</a>
        </div>

        <nav>
            {% if current_user.is_authenticated %}
              <a href="{{ url_for('logout') }}" class="nav-link">Logout</a>
            {% else %}
              <a href="{{ url_for('login') }}" class="nav-link">Sign In</a>
            {% endif %}
        </nav>
         
    </div>
</header>
