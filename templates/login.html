<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitMind - Sign In</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='css/signIn.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>

<div class="signin-container">
    <div class="signin-card">
        <h1>Welcome Back to FitMind</h1>
        <p class="subtext">Log in to track your stress and workouts.</p>


        <form class="signin-form" method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            {% for message in get_flashed_messages() %}
                <div>{{message}}</div>
            {% endfor %}
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Home_Page/index.html"></a><button type="submit" class="signin-btn"><i class="fas fa-user-plus"></i> Sign In</button></a>
            <a href="/FITMIND-APP-MAIN-PROJECT/FrontEnd/Home_Page/index.html"><button type="button" class="guest-btn"><i class="fas fa-user-secret"></i> Continue as Guest</button></a>

            <p class="forgot-password"><a href="#">Forgot your password?</a></p>
        </form>

        <p class="register-link">New to FitMind? <a href="{{ url_for('register') }}">Create an Account</a></p>
    </div>
</div>

</body>
</html>
